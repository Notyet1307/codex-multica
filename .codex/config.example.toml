#:schema https://developers.openai.com/codex/config-schema.json

# Copy selected keys into ~/.codex/config.toml for personal defaults,
# or into .codex/config.toml for trusted project-scoped defaults.
# Do not commit credentials, auth tokens, API keys, or local auth state.

model = "gpt-5.5"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
allow_login_shell = false
web_search = "cached"

[sandbox_workspace_write]
network_access = false

# Example: optional MCP server with token from environment.
# [mcp_servers.docs]
# url = "https://mcp.example.com"
# bearer_token_env_var = "DOCS_MCP_TOKEN"
# tool_timeout_sec = 60

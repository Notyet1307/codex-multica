name: DeepSeek pull request review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: deepseek-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate PR diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff --no-ext-diff --unified=80 "$BASE_SHA" "$HEAD_SHA" > pr.diff
          head -c 60000 pr.diff > pr-truncated.diff

      - name: Run DeepSeek review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python3 .github/scripts/deepseek_pr_review.py \
            pr-truncated.diff \
            .github/codex/prompts/review.md \
            deepseek-review.md

      - name: Post review comment
        uses: actions/github-script@v7
        env:
          REVIEW_BODY: ${{ github.workspace }}/deepseek-review.md
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");
            const body = fs.readFileSync(process.env.REVIEW_BODY, "utf8");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

name: Codex security review

on:
  pull_request:
    types: [labeled, opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  security_review:
    if: contains(github.event.pull_request.labels.*.name, 'security-review-required') || contains(github.event.pull_request.labels.*.name, 'risk:high')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          persist-credentials: false
          fetch-depth: 0

      - name: Run Codex security review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/security-review.md
          output-file: codex-security-output.md

  post_feedback:
    runs-on: ubuntu-latest
    needs: security_review
    if: needs.security_review.outputs.final_message != ''
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.security_review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
